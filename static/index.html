<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#edf2f7">
  <title>衡鉴 · 业务判断智能体</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="shell">
    <section class="intro-grid">
      <article class="hero-card">
        <span class="pill">项目评审 · 文档智能判断</span>
        <h1>业务判断<br>智能体</h1>
        <p>上传计划任务书或立项申请书，系统自动解析材料、调用 AI，并输出清晰的通过 / 不通过结果。</p>
        <div class="watermark">REVIEW AI</div>
      </article>

      <aside class="summary-card">
        <div class="summary-row"><span>支持输出</span><strong>单份 / 百份批量</strong></div>
        <div class="summary-row"><span>输入材料</span><strong>PDF · Word · CSV</strong></div>
        <div class="summary-row"><span>结果格式</span><strong>通过 / 不通过</strong></div>
      </aside>
    </section>

    <section class="task-card">
      <header class="step-head">
        <span class="step-number">1</span>
        <div><h2>创建评审任务</h2><p>选择材料类型，填写判断目标，并上传待评文档。</p></div>
      </header>

      <form id="form" autocomplete="off">
        <div class="field">
          <label for="dataset">数据集类型</label>
          <div class="control select-wrap">
            <select id="dataset" name="dataset_type">
              <option>计划任务书</option>
              <option>立项申请书</option>
            </select>
          </div>
        </div>

        <div class="field intent-field">
          <label for="intent">判断目标 <small>Intent</small></label>
          <div class="control">
            <input id="intent" name="intent" required autocomplete="off" aria-autocomplete="none" spellcheck="false" placeholder="例如：判断本项目创新程度是否足够">
          </div>
          <div class="intent-suggestions" id="intent-suggestions" hidden>
            <button type="button" data-intent="判断本项目创新程度是否足够">判断本项目创新程度是否足够</button>
            <button type="button" data-intent="判断项目方案是否具备可行性">判断项目方案是否具备可行性</button>
            <button type="button" data-intent="判断任务目标是否明确且可量化">判断任务目标是否明确且可量化</button>
          </div>
        </div>

        <label class="drop" id="drop-zone" for="files">
          <input id="files" name="files" type="file" multiple required accept=".pdf,.doc,.docx,.txt,.md,.json,.jsonl,.csv">
          <span class="upload-icon">↑</span>
          <span class="drop-copy">
            <b>上传评测材料</b>
            <small id="file-note">支持 PDF、DOC、DOCX、TXT、MD、JSON(L)、CSV，最多 100 条</small>
          </span>
          <span class="browse">选择文件</span>
        </label>

        <button type="submit"><span>运行智能体</span><span class="arrow">→</span></button>
      </form>
    </section>

    <section class="process-card">
      <header class="step-head">
        <span class="step-number">2</span>
        <div><h2>智能评审结果</h2><p>系统完成解析和判断后，将在下方展示简洁结论。</p></div>
        <span class="engine-state"><i></i> DeepSeek 已连接</span>
      </header>
      <section id="status" aria-live="polite"></section>
      <section id="results"></section>
      <div class="empty-state">结果格式：文档名称：通过 / 不通过</div>
    </section>

    <footer><span>衡鉴 HENGJIAN</span><p>AI 结论仅供业务评审参考，请结合实际情况进行最终决策。</p></footer>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
